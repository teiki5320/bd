<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Micro-Drama BD Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Crimson+Pro:ital@1&family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="bd_style.css">
</head>
<body>

<!-- ============ ÉCRAN 1 : BIBLIOTHÈQUE ============ -->
<div id="library" class="screen active">
  <div class="library-wrapper">
    <header class="library-header">
      <h1 class="library-title">Micro-Drama BD</h1>
      <p class="library-subtitle">Générateur de BD alimenté par Claude AI</p>
    </header>

    <button class="btn-primary btn-new-project" onclick="showCreation()">
      + Nouveau micro-drame
    </button>

    <div id="projectList" class="project-grid">
      <!-- Filled by JS -->
    </div>

    <div id="emptyLibrary" class="empty-library hidden">
      <div class="empty-icon">&#128218;</div>
      <p>Aucun projet pour l'instant.</p>
      <p class="empty-hint">Créez votre premier micro-drame africain !</p>
    </div>
  </div>
</div>

<!-- ============ ÉCRAN 2 : CRÉATION / PARAMÈTRES ============ -->
<div id="creation" class="screen">
  <div class="creation-wrapper">
    <button class="btn-back" onclick="showLibrary()">&#8592; Bibliothèque</button>
    <h2 class="creation-title">Nouveau Micro-Drame</h2>

    <form id="creationForm" class="creation-form" onsubmit="return false;">
      <!-- Titre -->
      <div class="form-group">
        <label class="form-label" for="inputTitle">Titre du micro-drame</label>
        <input type="text" id="inputTitle" class="form-input" placeholder="Ex: La Fille du Quartier" required>
      </div>

      <!-- Description -->
      <div class="form-group">
        <label class="form-label" for="inputDescription">Description de l'histoire</label>
        <textarea id="inputDescription" class="form-textarea" rows="3" placeholder="Décrivez l'intrigue en 2-3 lignes..." required></textarea>
      </div>

      <!-- Ville / Contexte -->
      <div class="form-group">
        <label class="form-label" for="inputSetting">Ville / Contexte</label>
        <input type="text" id="inputSetting" class="form-input" placeholder="Ex: Bakara, ville fictive africaine">
      </div>

      <!-- Épisodes & Cases -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="inputEpisodes">Nombre d'épisodes</label>
          <select id="inputEpisodes" class="form-select">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="inputPanels">Cases par épisode</label>
          <select id="inputPanels" class="form-select">
            <option value="10">10</option>
            <option value="12">12</option>
            <option value="15" selected>15</option>
            <option value="18">18</option>
            <option value="20">20</option>
            <option value="25">25</option>
          </select>
        </div>
      </div>

      <!-- Thèmes -->
      <div class="form-group">
        <label class="form-label">Thèmes</label>
        <div class="theme-checkboxes">
          <label class="checkbox-label"><input type="checkbox" value="Romance interdite"> Romance interdite</label>
          <label class="checkbox-label"><input type="checkbox" value="Vengeance"> Vengeance</label>
          <label class="checkbox-label"><input type="checkbox" value="Ascension sociale"> Ascension sociale</label>
          <label class="checkbox-label"><input type="checkbox" value="Secrets de famille"> Secrets de famille</label>
        </div>
      </div>

      <!-- Personnages -->
      <div class="form-group">
        <label class="form-label">Personnages <span class="form-hint">(jusqu'à 6)</span></label>
        <div id="characterFields" class="character-fields">
          <!-- Filled by JS -->
        </div>
        <button type="button" class="btn-add-char" id="btnAddChar" onclick="addCharacterField()">+ Ajouter un personnage</button>
      </div>

      <!-- Clé API -->
      <div class="form-group">
        <label class="form-label" for="inputApiKey">Clé API Claude</label>
        <input type="password" id="inputApiKey" class="form-input" placeholder="sk-ant-..." required>
        <span class="form-hint">Stockée localement dans votre navigateur</span>
      </div>

      <!-- Bouton Générer -->
      <button type="button" class="btn-primary btn-generate" onclick="startGeneration()">
        &#10022; Générer avec Claude
      </button>
    </form>
  </div>
</div>

<!-- ============ ÉCRAN 3 : GÉNÉRATION EN COURS ============ -->
<div id="generating" class="screen">
  <div class="generating-wrapper">
    <div class="generating-icon">&#9881;</div>
    <h2 class="generating-title" id="genTitle">Génération en cours...</h2>
    <p class="generating-message" id="genMessage">Préparation...</p>
    <div class="progress-bar-wrapper">
      <div class="progress-bar-gen">
        <div class="progress-fill-gen" id="genProgressFill" style="width:0%"></div>
      </div>
    </div>
    <p class="generating-hint">Cela peut prendre 30 à 60 secondes</p>
    <button class="btn-back btn-cancel-gen hidden" id="btnCancelGen" onclick="cancelGeneration()">Annuler</button>
    <div id="genError" class="gen-error hidden"></div>
  </div>
</div>

<!-- ============ ÉCRAN 4 : VISIONNEUSE BD ============ -->
<div id="viewer" class="screen">
  <header class="viewer-header">
    <button class="btn-back" onclick="showLibrary()">&#8592; Bibliothèque</button>
    <h2 class="viewer-title" id="viewerTitle">—</h2>
  </header>

  <!-- Onglets -->
  <nav class="viewer-tabs">
    <button class="tab-btn active" data-tab="bd" onclick="switchTab('bd')">&#127916; BD</button>
    <button class="tab-btn" data-tab="characters" onclick="switchTab('characters')">&#128100; Personnages</button>
    <button class="tab-btn" data-tab="prompts" onclick="switchTab('prompts')">&#128203; Prompts</button>
  </nav>

  <!-- Onglet BD -->
  <div id="tabBD" class="tab-content active">
    <!-- Navigation épisodes -->
    <div class="episode-nav">
      <button class="btn-ep-nav" id="btnPrevEp" onclick="changeEpisode(-1)">&#9664; Précédent</button>
      <span class="episode-indicator" id="episodeIndicator">Épisode 1 / 1</span>
      <button class="btn-ep-nav" id="btnNextEp" onclick="changeEpisode(1)">Suivant &#9654;</button>
    </div>
    <h3 class="episode-title" id="episodeTitle"></h3>
    <div id="bdGrid" class="bd-grid">
      <!-- Filled by JS -->
    </div>
    <div class="cliffhanger-banner hidden" id="cliffhangerBanner"></div>
  </div>

  <!-- Onglet Personnages -->
  <div id="tabCharacters" class="tab-content">
    <div id="charactersList" class="characters-list">
      <!-- Filled by JS -->
    </div>
  </div>

  <!-- Onglet Prompts -->
  <div id="tabPrompts" class="tab-content">
    <div id="promptsList" class="prompts-list">
      <!-- Filled by JS -->
    </div>
  </div>
</div>

<!-- ============ OVERLAY DÉTAIL CASE ============ -->
<div id="panelOverlay" class="panel-overlay hidden" onclick="closePanelOverlay(event)">
  <div class="overlay-content" onclick="event.stopPropagation()">
    <button class="overlay-close" onclick="closePanelOverlay()">&times;</button>
    <div id="overlayBody"></div>
  </div>
</div>

<!-- Hidden file input for image uploads -->
<input type="file" id="imageUploadInput" accept="image/*" class="hidden" onchange="handleImageUpload(event)">

<script src="storage.js"></script>
<script src="generator.js"></script>
<script src="bd_script.js"></script>
</body>
</html>
