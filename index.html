<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Afrotok Stories</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#F2EDE4;color:#2a2a2a;font-family:'Lora',Georgia,serif;-webkit-font-smoothing:antialiased}

/* === DECORATIVE CIRCLES === */
.deco-circle{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.deco-1{width:200px;height:200px;background:#E85D4A;opacity:.15;top:-60px;right:-40px}
.deco-2{width:140px;height:140px;background:#E85D4A;opacity:.1;bottom:40px;left:-50px}
.deco-3{width:100px;height:100px;background:#D4AF37;opacity:.08;top:40%;right:-30px}

/* === SCREEN 1 — INPUT === */
.input-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;position:relative;z-index:1}
.input-screen h1{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(2rem,6vw,3.2rem);color:#E85D4A;letter-spacing:2px;margin-bottom:4px}
.input-screen .subtitle{font-family:'Playfair Display',serif;font-style:italic;font-size:.95rem;color:#8a7a6a;letter-spacing:2px;margin-bottom:32px}
.input-card{width:100%;max-width:600px;background:#3A3A3A;border-radius:16px;padding:24px;box-shadow:0 8px 30px rgba(0,0,0,.12)}
.json-area{width:100%;min-height:220px;background:#2a2a2a;border:1px solid #4a4a4a;border-radius:10px;color:#e0d8cc;font-family:'Courier New',monospace;font-size:.8rem;padding:14px;resize:vertical;outline:none;line-height:1.6}
.json-area:focus{border-color:#E85D4A}
.json-area::placeholder{color:#6a6a5a}
.error-msg{color:#E85D4A;font-size:.82rem;margin-top:8px;min-height:1.2em;text-align:center;font-style:italic}
.btn-open{margin-top:20px;padding:14px 44px;background:#E85D4A;border:none;color:#fff;font-family:'Playfair Display',serif;font-size:1.05rem;letter-spacing:2px;cursor:pointer;transition:all .3s;border-radius:10px;text-transform:uppercase}
.btn-open:hover{background:#d4503f;transform:scale(1.03)}
.link-example{margin-top:14px;color:#8a7a6a;font-size:.8rem;cursor:pointer;text-decoration:underline;background:none;border:none;font-family:'Lora',serif}
.link-example:hover{color:#E85D4A}

/* === SCREEN 2 — READER === */
.reader-screen{display:flex;flex-direction:column;min-height:100vh;position:relative;z-index:1}
.reader-top{display:flex;align-items:center;padding:12px 20px;flex-shrink:0}
.btn-back-r{background:none;border:none;color:#8a7a6a;font-family:'Lora',serif;font-size:.85rem;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-back-r:hover{color:#E85D4A}
.reader-title{flex:1;text-align:center;font-family:'Playfair Display',serif;font-size:.9rem;color:#3A3A3A;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 10px}
.page-counter{font-family:'Playfair Display',serif;font-size:.85rem;color:#E85D4A;font-weight:700;white-space:nowrap}
.btn-settings-r{background:none;border:none;color:#8a7a6a;font-size:1.1rem;cursor:pointer;margin-left:8px;padding:4px}
.btn-settings-r:hover{color:#E85D4A}

/* Settings popover */
.settings-pop{position:absolute;top:48px;right:16px;background:#3A3A3A;border-radius:12px;padding:16px;z-index:50;box-shadow:0 8px 30px rgba(0,0,0,.3);width:280px}
.settings-pop label{color:#ccc;font-size:.75rem;display:block;margin-bottom:4px}
.settings-pop input{width:100%;background:#2a2a2a;border:1px solid #4a4a4a;color:#e0d8cc;padding:8px;border-radius:6px;font-size:.8rem;outline:none}
.settings-pop input:focus{border-color:#E85D4A}
.settings-pop .s-row{display:flex;gap:8px;margin-top:8px}
.settings-pop .s-btn{background:#E85D4A;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:.75rem;cursor:pointer}
.settings-pop .s-status{font-size:.75rem;line-height:30px}
.s-ok{color:#5a5}
.s-err{color:#E85D4A}

/* Reader body */
.reader-body{flex:1;display:flex;align-items:center;justify-content:center;padding:0 16px 16px;overflow:hidden;position:relative}
.nav-arrow{position:absolute;top:50%;transform:translateY(-50%);background:none;border:none;font-size:2rem;cursor:pointer;color:#ccc;z-index:10;padding:16px;font-family:serif;transition:color .2s}
.nav-arrow:hover{color:#E85D4A}
.nav-arrow:disabled{opacity:.2;cursor:default}
.nav-left{left:0}
.nav-right{right:0}

/* Page card */
.page-card{width:100%;max-width:440px;background:#3A3A3A;border-radius:20px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.15);display:flex;flex-direction:column;max-height:calc(100vh - 90px);animation:cardIn .4s ease}
@keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

/* Image section */
.page-img-section{position:relative;width:100%;aspect-ratio:4/3;overflow:hidden;background:#2a2a2a;flex-shrink:0}
.page-img-section img{width:100%;height:100%;object-fit:cover}
.placeholder-r{width:100%;height:100%;background:linear-gradient(160deg,#2a2a2a,#3a3020,#2a2a2a);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.placeholder-r svg{opacity:.2}
.placeholder-r .ph-label{font-family:'Playfair Display',serif;font-style:italic;color:#D4AF37;opacity:.4;font-size:.8rem;letter-spacing:1px}

/* Image action buttons */
.img-actions{display:flex;gap:8px;padding:8px 12px;background:#333;flex-shrink:0}
.btn-gen{flex:1;padding:8px;background:#E85D4A;color:#fff;border:none;border-radius:8px;font-family:'Lora',serif;font-size:.75rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px}
.btn-gen:hover{background:#d4503f}
.btn-gen:disabled{opacity:.5;cursor:wait}
.btn-gen.generating{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.btn-import{flex:1;padding:8px;background:transparent;color:#ccc;border:1px solid #555;border-radius:8px;font-family:'Lora',serif;font-size:.75rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px}
.btn-import:hover{border-color:#E85D4A;color:#E85D4A}
.gen-status-text{font-size:.65rem;color:#D4AF37;text-align:center;padding:2px 12px 6px;background:#333;min-height:18px}

/* Text section */
.page-text-section{flex:1;overflow-y:auto;padding:24px 20px 20px;background:#F2EDE4;min-height:120px}
.page-text-section::-webkit-scrollbar{width:4px}
.page-text-section::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}
.page-text-r{font-family:'Lora',serif;font-size:.95rem;line-height:1.85;color:#2a2a2a;text-align:justify;hyphens:auto}
.page-num{font-family:'Playfair Display',serif;font-size:.7rem;color:#bbb;text-align:right;margin-top:12px;letter-spacing:1px}

/* Last page restart */
.btn-restart-r{margin-top:16px;padding:12px 32px;background:#E85D4A;border:none;color:#fff;font-family:'Playfair Display',serif;font-size:.9rem;letter-spacing:2px;cursor:pointer;border-radius:8px;align-self:center;display:block;margin-left:auto;margin-right:auto}
.btn-restart-r:hover{background:#d4503f}

/* === CHARACTERS PAGE === */
.char-page{padding:20px}
.char-page h2{font-family:'Playfair Display',serif;font-size:1.3rem;color:#3A3A3A;text-align:center;margin-bottom:16px;letter-spacing:2px}
.char-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.char-item{background:#3A3A3A;border-radius:12px;overflow:hidden;text-align:center}
.char-photo{width:100%;aspect-ratio:1;background:#2a2a2a;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.char-photo img{width:100%;height:100%;object-fit:cover}
.char-photo .ph-char{color:#D4AF37;opacity:.3;font-size:2.5rem}
.char-name{font-family:'Playfair Display',serif;font-size:.85rem;color:#F2EDE4;padding:8px 6px 4px;letter-spacing:1px}
.char-actions{display:flex;gap:6px;padding:4px 8px 10px;justify-content:center}
.char-actions .btn-gen{flex:none;padding:6px 12px;font-size:.7rem}
.char-actions .btn-import{flex:none;padding:6px 12px;font-size:.7rem}

/* Progress dots */
.progress-dots{display:flex;justify-content:center;gap:6px;padding:10px 0;flex-shrink:0}
.pdot{width:8px;height:8px;border-radius:50%;background:#ddd;transition:all .3s;cursor:pointer}
.pdot.active{background:#E85D4A;transform:scale(1.3)}

/* Mobile */
@media(max-width:500px){
  .page-card{max-width:100%;border-radius:14px}
  .reader-body{padding:0 8px 10px}
  .nav-arrow{font-size:1.4rem;padding:10px 6px}
}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="deco-circle deco-1"></div>
<div class="deco-circle deco-2"></div>
<div class="deco-circle deco-3"></div>
<div id="root"></div>
<input type="file" id="fileInput" accept="image/*" style="display:none">
<script src="comfyui-service.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback}=React;
const STYLE='realistic comic book style, dramatic lighting, cinematic composition, warm African color palette, detailed linework, strong shadows';

const DEMO={"titre":"Le Secret du Baobab de Verre","auteur":"Afrotok Stories","personnages":[{"id":"kofi","nom":"Kofi","description":"Young African man, 25 years old, short hair, determined eyes, strong jaw, wearing traditional woven cloth, brown skin"},{"id":"aminata","nom":"Aminata","description":"Elderly African woman, 70 years old, white hair in headwrap, deep wise eyes, wrinkled face, colorful boubou dress"},{"id":"mariama","nom":"Mariama","description":"Beautiful African woman, 24 years old, long braided hair, gentle almond eyes, warm smile, modern elegant dress, brown skin"}],"pages":[{"numero":1,"texte":"Kofi n\u2019avait jamais compris pourquoi sa m\u00e8re interdisait qu\u2019on s\u2019approche du vieux baobab au fond du village. Chaque soir, elle posait une calebasse d\u2019eau \u00e0 ses pieds et murmurait des mots que personne ne devait entendre. Ce soir-l\u00e0, pour la premi\u00e8re fois, Kofi d\u00e9cida de ne pas ob\u00e9ir.","image":"","personnages_presents":["kofi"]},{"numero":2,"texte":"Derri\u00e8re l\u2019\u00e9corce mill\u00e9naire, il trouva une cavit\u00e9 que personne n\u2019aurait pu deviner de l\u2019ext\u00e9rieur. \u00c0 l\u2019int\u00e9rieur\u00a0: un miroir de verre souffl\u00e9, aussi fin qu\u2019une aile d\u2019insecte, encadr\u00e9 d\u2019or tress\u00e9. Son reflet lui renvoya un visage qu\u2019il ne reconnut pas \u2014 celui d\u2019un homme plus vieux, marqu\u00e9 par des ann\u00e9es de douleur.","image":"","personnages_presents":["kofi"]},{"numero":3,"texte":"\u2014 Ce miroir appartient \u00e0 ta lign\u00e9e depuis sept g\u00e9n\u00e9rations, dit une voix derri\u00e8re lui. Aminata, la vieille gardienne du village, se tenait l\u00e0, immobile comme si elle l\u2019attendait. \u2014 Il montre ce que tu seras si tu r\u00e9p\u00e8tes les erreurs de ton p\u00e8re. Kofi sentit son sang se glacer.","image":"","personnages_presents":["kofi","aminata"]},{"numero":4,"texte":"Son p\u00e8re. Ce mot ouvrit une blessure que Kofi croyait cicatris\u00e9e. Djibril \u00e9tait parti quand Kofi avait six ans, laissant derri\u00e8re lui des dettes, une femme bris\u00e9e, et un fils qui avait jur\u00e9 de ne jamais lui ressembler. Mais le miroir ne mentait pas.","image":"","personnages_presents":["kofi","aminata"]},{"numero":5,"texte":"\u2014 Qu\u2019est-ce que je dois faire pour que ce reflet change\u00a0? demanda Kofi, la gorge serr\u00e9e. Aminata posa sa main rid\u00e9e sur son \u00e9paule. \u2014 Il y a une femme en ville qui attend une v\u00e9rit\u00e9 que tu lui dois depuis trois ans.","image":"","personnages_presents":["kofi","aminata"]},{"numero":6,"texte":"Mariama. Son pr\u00e9nom traversa l\u2019esprit de Kofi comme une braise. Il l\u2019avait aim\u00e9e. Il l\u2019avait trahie avec un mensonge de silence \u2014 le pire des mensonges.","image":"","personnages_presents":["kofi"]},{"numero":7,"texte":"Il revint en ville avant l\u2019aube. Mariama ouvrit sa porte sans surprise. \u2014 Je sais d\u00e9j\u00e0, dit-elle simplement. Ce que je veux savoir, c\u2019est pourquoi tu as choisi le silence. Kofi dit la v\u00e9rit\u00e9 laide.","image":"","personnages_presents":["kofi","mariama"]},{"numero":8,"texte":"Les mots sortirent lentement, comme du poison qu\u2019on extrait d\u2019une plaie. Il parla de la peur. De la honte. Mariama l\u2019\u00e9couta sans l\u2019interrompre. Quand il termina, elle dit\u00a0: \u2014 Tu m\u2019as vol\u00e9 trois ans.","image":"","personnages_presents":["kofi","mariama"]},{"numero":9,"texte":"Kofi retourna voir le baobab. Cette fois, son reflet avait chang\u00e9. Le vieil homme souriait \u2014 d\u2019un sourire qui ressemblait \u00e0 de la paix. Aminata apparut. \u2014 Le miroir ne montre pas le destin. Il montre ce que tu m\u00e9rites si tu fais le travail.","image":"","personnages_presents":["kofi","aminata"]},{"numero":10,"texte":"Mariama revint. Pas pour tout effacer \u2014 certaines choses ne s\u2019effacent pas. Mais pour construire quelque chose qui connaissait sa propre fragilit\u00e9. Le baobab de verre brilla cette nuit-l\u00e0 d\u2019une lumi\u00e8re que seuls les c\u0153urs courageux peuvent voir.","image":"","personnages_presents":["kofi","mariama"]}]};

const PH_SVGS=[
  '<svg viewBox="0 0 120 120" width="60" height="60"><path d="M60 95L60 60Q40 55 35 35Q33 20 50 15Q55 5 65 12Q80 8 82 25Q90 30 85 45Q95 55 60 60" fill="none" stroke="#D4AF37" stroke-width="1.5"/></svg>',
  '<svg viewBox="0 0 120 120" width="60" height="60"><circle cx="60" cy="60" r="30" fill="none" stroke="#D4AF37" stroke-width="1.5"/><circle cx="72" cy="52" r="24" fill="#2a2a2a"/></svg>',
  '<svg viewBox="0 0 120 120" width="60" height="60"><ellipse cx="60" cy="55" rx="22" ry="28" fill="none" stroke="#D4AF37" stroke-width="1.5"/><circle cx="52" cy="50" r="2" fill="#D4AF37" opacity=".5"/><circle cx="68" cy="50" r="2" fill="#D4AF37" opacity=".5"/></svg>',
  '<svg viewBox="0 0 120 120" width="60" height="60"><polygon points="60,15 68,45 100,45 74,63 82,95 60,75 38,95 46,63 20,45 52,45" fill="none" stroke="#D4AF37" stroke-width="1.5"/></svg>',
  '<svg viewBox="0 0 120 120" width="60" height="60"><ellipse cx="60" cy="58" rx="26" ry="34" fill="none" stroke="#D4AF37" stroke-width="1.5"/><ellipse cx="50" cy="48" rx="6" ry="4" fill="none" stroke="#D4AF37" stroke-width="1"/><ellipse cx="70" cy="48" rx="6" ry="4" fill="none" stroke="#D4AF37" stroke-width="1"/></svg>'
];

function Placeholder({n}){return <div className="placeholder-r"><div dangerouslySetInnerHTML={{__html:PH_SVGS[n%PH_SVGS.length]}}/><span className="ph-label">Page {n}</span></div>}

function InputScreen({onOpen}){
  const[json,setJson]=useState('');
  const[error,setError]=useState('');
  const handleOpen=()=>{
    setError('');
    if(!json.trim()){setError('Collez un JSON pour commencer.');return}
    try{
      const m=json.match(/\{[\s\S]*\}/);
      if(!m)throw new Error('Aucun JSON trouvé.');
      const d=JSON.parse(m[0]);
      if(!d.pages||!d.pages.length)throw new Error('Le JSON doit contenir "pages".');
      d.titre=d.titre||'Sans titre';d.auteur=d.auteur||'';
      d.personnages=d.personnages||[];
      onOpen(d);
    }catch(e){setError(e.message)}
  };
  return(
    <div className="input-screen">
      <h1>Afrotok Stories</h1>
      <div className="subtitle">Micro-Drama Africain</div>
      <div className="input-card">
        <textarea className="json-area" value={json} onChange={e=>setJson(e.target.value)}
          placeholder={'Collez votre JSON ici...\n\n{\n  "titre": "...",\n  "pages": [...]\n}'} spellCheck="false"/>
      </div>
      <div className="error-msg">{error}</div>
      <button className="btn-open" onClick={handleOpen}>Ouvrir le livre →</button>
      <button className="link-example" onClick={()=>{setJson(JSON.stringify(DEMO,null,2));setError('')}}>Voir un exemple</button>
    </div>
  );
}

function Reader({data,onBack}){
  const[idx,setIdx]=useState(0);
  const[images,setImages]=useState({});
  const[charRefs,setCharRefs]=useState({});
  const[genStatus,setGenStatus]=useState({});
  const[showSettings,setShowSettings]=useState(false);
  const[comfyUrl,setComfyUrl]=useState(typeof ComfyUI!=='undefined'?ComfyUI.getUrl():'');
  const[comfyStatus,setComfyStatus]=useState('');
  const touchRef=useRef(null);
  const busyRef=useRef(false);
  const totalPages=data.pages.length+(data.personnages.length>0?1:0);
  const isCharPage=data.personnages.length>0&&idx===data.pages.length;
  const isLastStory=idx===data.pages.length-1&&data.personnages.length===0;

  const go=useCallback((dir)=>{
    if(busyRef.current)return;
    const n=idx+dir;
    if(n<0||n>=totalPages)return;
    busyRef.current=true;
    setIdx(n);
    setTimeout(()=>{busyRef.current=false},400);
  },[idx,totalPages]);

  useEffect(()=>{
    const h=(e)=>{if(e.key==='ArrowRight'||e.key===' ')go(1);else if(e.key==='ArrowLeft')go(-1)};
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[go]);

  const onTS=(e)=>{touchRef.current=e.touches[0].clientX};
  const onTE=(e)=>{if(touchRef.current===null)return;const d=touchRef.current-e.changedTouches[0].clientX;if(Math.abs(d)>50)go(d>0?1:-1);touchRef.current=null};

  const getImgSrc=(key)=>{
    const img=images[key];
    if(!img)return null;
    if(typeof img==='string')return img;
    if(img.type==='comfyui')return(typeof ComfyUI!=='undefined'?ComfyUI.getUrl():'')+'/view?filename='+encodeURIComponent(img.filename)+'&type=output';
    return null;
  };

  const uploadImg=(key)=>{
    const fi=document.getElementById('fileInput');
    fi.onchange=(e)=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();
      r.onload=(ev)=>{setImages(p=>({...p,[key]:ev.target.result}))};
      r.readAsDataURL(f);fi.value='';
    };
    fi.click();
  };

  const genPanel=async(pageIdx)=>{
    if(typeof ComfyUI==='undefined'){alert('ComfyUI non disponible');return}
    const ok=await ComfyUI.ping();if(!ok){alert('ComfyUI inaccessible. Vérifiez les paramètres.');return}
    const page=data.pages[pageIdx];
    const prompt=(page.texte?page.texte.substring(0,100)+', ':'')+'African scene, '+STYLE;
    let ref=null;
    if(page.personnages_presents&&page.personnages_presents.length>0){
      ref=charRefs[page.personnages_presents[0]]||null;
    }
    const key='page-'+pageIdx;
    setGenStatus(p=>({...p,[key]:'Génération en cours...'}));
    try{
      const result=await ComfyUI.generatePanel(prompt,ref,(msg)=>setGenStatus(p=>({...p,[key]:msg})));
      setImages(p=>({...p,[key]:result}));
      setGenStatus(p=>({...p,[key]:'✓ Terminé'}));
    }catch(err){
      setGenStatus(p=>({...p,[key]:'✗ '+err.message}));
    }
  };

  const genChar=async(charId)=>{
    if(typeof ComfyUI==='undefined'){alert('ComfyUI non disponible');return}
    const ok=await ComfyUI.ping();if(!ok){alert('ComfyUI inaccessible.');return}
    const char=data.personnages.find(c=>c.id===charId);if(!char)return;
    const prompt=char.description+', portrait, face close-up, front view, looking at camera, neutral background, '+STYLE;
    const key='char-'+charId;
    setGenStatus(p=>({...p,[key]:'Génération portrait...'}));
    try{
      const result=await ComfyUI.generatePortrait(prompt,(msg)=>setGenStatus(p=>({...p,[key]:msg})));
      setImages(p=>({...p,[key]:result}));
      if(result&&result.type==='comfyui')setCharRefs(p=>({...p,[charId]:result.filename}));
      setGenStatus(p=>({...p,[key]:'✓ Terminé'}));
    }catch(err){
      setGenStatus(p=>({...p,[key]:'✗ '+err.message}));
    }
  };

  const saveComfy=async()=>{
    if(typeof ComfyUI!=='undefined'){ComfyUI.setUrl(comfyUrl);const ok=await ComfyUI.ping();setComfyStatus(ok?'ok':'err')}
  };

  const renderStoryPage=(page,pi)=>{
    const key='page-'+pi;
    const src=getImgSrc(key);
    const isLast=pi===data.pages.length-1&&data.personnages.length===0;
    return(
      <div className="page-card" key={pi}>
        <div className="page-img-section">
          {src?<img src={src} alt={'Page '+(pi+1)}/>:<Placeholder n={pi+1}/>}
        </div>
        <div className="img-actions">
          <button className="btn-gen" onClick={()=>genPanel(pi)} disabled={!!genStatus[key]&&genStatus[key].startsWith('Gén')}>🎨 Générer</button>
          <button className="btn-import" onClick={()=>uploadImg(key)}>📷 Importer</button>
        </div>
        {genStatus[key]&&<div className="gen-status-text">{genStatus[key]}</div>}
        <div className="page-text-section">
          <div className="page-text-r">{page.texte}</div>
          {isLast?<button className="btn-restart-r" onClick={()=>setIdx(0)}>↺ Recommencer</button>:<div className="page-num">{page.numero||pi+1} / {data.pages.length}</div>}
        </div>
      </div>
    );
  };

  const renderCharPage=()=>(
    <div className="page-card" key="chars">
      <div className="page-text-section char-page">
        <h2>Personnages</h2>
        <div className="char-grid">
          {data.personnages.map(c=>{
            const key='char-'+c.id;
            const src=getImgSrc(key);
            return(
              <div className="char-item" key={c.id}>
                <div className="char-photo">{src?<img src={src} alt={c.nom}/>:<span className="ph-char">👤</span>}</div>
                <div className="char-name">{c.nom}</div>
                <div className="char-actions">
                  <button className="btn-gen" onClick={()=>genChar(c.id)}>🎨</button>
                  <button className="btn-import" onClick={()=>uploadImg(key)}>📷</button>
                </div>
                {genStatus[key]&&<div className="gen-status-text">{genStatus[key]}</div>}
              </div>
            );
          })}
        </div>
        <button className="btn-restart-r" style={{marginTop:20}} onClick={()=>setIdx(0)}>↺ Recommencer</button>
      </div>
    </div>
  );

  return(
    <div className="reader-screen" onTouchStart={onTS} onTouchEnd={onTE}>
      <div className="reader-top">
        <button className="btn-back-r" onClick={onBack}>← Retour</button>
        <div className="reader-title">{data.titre}</div>
        <span className="page-counter">{idx+1}/{totalPages}</span>
        <button className="btn-settings-r" onClick={()=>setShowSettings(!showSettings)}>⚙</button>
      </div>
      {showSettings&&<div className="settings-pop">
        <label>URL ComfyUI</label>
        <input value={comfyUrl} onChange={e=>setComfyUrl(e.target.value)} placeholder="http://127.0.0.1:8188"/>
        <div className="s-row"><button className="s-btn" onClick={saveComfy}>Enregistrer</button><span className={'s-status '+(comfyStatus==='ok'?'s-ok':comfyStatus==='err'?'s-err':'')}>{comfyStatus==='ok'?'✓ Connecté':comfyStatus==='err'?'✗ Échec':''}</span></div>
      </div>}
      <div className="reader-body">
        <button className="nav-arrow nav-left" onClick={()=>go(-1)} disabled={idx===0}>‹</button>
        {isCharPage?renderCharPage():renderStoryPage(data.pages[idx],idx)}
        <button className="nav-arrow nav-right" onClick={()=>go(1)} disabled={idx===totalPages-1}>›</button>
      </div>
      <div className="progress-dots">{Array.from({length:totalPages},(_,i)=><span key={i} className={'pdot'+(i===idx?' active':'')} onClick={()=>setIdx(i)}/>)}</div>
    </div>
  );
}

function App(){
  const[data,setData]=useState(null);
  return data?<Reader data={data} onBack={()=>setData(null)}/>:<InputScreen onOpen={setData}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
